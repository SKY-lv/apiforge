<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APIForge - API 测试工作台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;}
.app{display:grid;grid-template-columns:280px 1fr;height:100vh;}
.sidebar{background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column;}
.sidebar-header{padding:14px 16px;border-bottom:1px solid #30363d;font-weight:600;font-size:14px;}
.collection-list{flex:1;overflow-y:auto;padding:8px;}
.collection-item{padding:10px 14px;border-radius:6px;cursor:pointer;margin:2px 0;display:flex;align-items:center;gap:10px;transition:all 0.15s;}
.collection-item:hover{background:#21262d;}
.collection-item.active{background:#1f6feb33;border:1px solid #1f6feb;}
.method-badge{padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600;text-transform:uppercase;}
.method-get{background:#238636;color:#fff;}
.method-post{background:#1f6feb;color:#fff;}
.method-put{background:#d29922;color:#000;}
.method-delete{background:#da3633;color:#fff;}
.method-patch{background:#a371f7;color:#fff;}
.main{display:flex;flex-direction:column;background:#0d1117;}
.toolbar{height:48px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;padding:0 16px;gap:12px;}
.url-bar{flex:1;display:flex;align-items:center;gap:8px;}
.method-select{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:8px 12px;color:#c9d1d9;font-size:13px;cursor:pointer;}
.url-input{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px 14px;color:#c9d1d9;font-size:14px;font-family:'Courier New',monospace;}
.url-input:focus{outline:none;border-color:#1f6feb;}
.send-btn{padding:10px 20px;background:#238636;border:none;border-radius:6px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.2s;}
.send-btn:hover{background:#2ea043;}
.send-btn.loading{background:#6e7681;}
.content-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.tabs{display:flex;background:#161b22;border-bottom:1px solid #30363d;}
.tab{padding:10px 20px;cursor:pointer;font-size:13px;color:#8b949e;border-bottom:2px solid transparent;transition:all 0.15s;}
.tab:hover{color:#c9d1d9;}
.tab.active{color:#c9d1d9;border-bottom-color:#1f6feb;}
.tab-content{flex:1;overflow:auto;padding:16px;}
.editor-area{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:12px;min-height:200px;font-family:'Courier New',monospace;font-size:13px;color:#c9d1d9;resize:vertical;}
.editor-area:focus{outline:none;border-color:#1f6feb;}
.response-area{flex:1;display:flex;flex-direction:column;}
.response-header{padding:12px 16px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;gap:16px;}
.status-badge{padding:4px 10px;border-radius:4px;font-size:12px;font-weight:600;}
.status-2xx{background:#23863633;color:#3fb950;}
.status-4xx{background:#d2992233;color:#d29922;}
.status-5xx{background:#da363333;color:#f85149;}
.response-body{flex:1;overflow:auto;padding:16px;font-family:'Courier New',monospace;font-size:13px;white-space:pre-wrap;}
.json-key{color:#79c0ff;}
.json-string{color:#a5d6ff;}
.json-number{color:#79c0ff;}
.json-boolean{color:#ff7b72;}
.history-item{padding:8px 14px;border-bottom:1px solid #21262d;cursor:pointer;}
.history-item:hover{background:#161b22;}
.btn{padding:6px 12px;border:1px solid #30363d;background:#21262d;border-radius:6px;color:#c9d1d9;font-size:12px;cursor:pointer;}
.btn:hover{background:#30363d;}
.btn-primary{background:#1f6feb;border-color:#1f6feb;color:#fff;}
.btn-primary:hover{background:#388bfd;}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal.show{display:flex;}
.modal-content{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;min-width:400px;}
input[type="text"],textarea{background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:8px 12px;font-size:13px;}
input[type="text"]:focus,textarea:focus{outline:none;border-color:#1f6feb;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">📚 请求集合</div>
    <div class="collection-list" id="collection-list"></div>
    <div style="padding:12px;border-top:1px solid #30363d">
      <button class="btn" style="width:100%" onclick="showNewRequest()">+ 新建请求</button>
    </div>
  </div>
  
  <div class="main">
    <div class="toolbar">
      <div class="url-bar">
        <select class="method-select" id="method">
          <option value="GET">GET</option>
          <option value="POST">POST</option>
          <option value="PUT">PUT</option>
          <option value="DELETE">DELETE</option>
          <option value="PATCH">PATCH</option>
        </select>
        <input type="text" class="url-input" id="url" placeholder="https://api.example.com/endpoint" value="https://httpbin.org/get">
      </div>
      <button class="send-btn" id="send-btn" onclick="sendRequest()">发送</button>
      <button class="btn" onclick="saveRequest()">💾 保存</button>
    </div>
    
    <div class="tabs">
      <div class="tab active" onclick="switchTab('params')">Params</div>
      <div class="tab" onclick="switchTab('headers')">Headers</div>
      <div class="tab" onclick="switchTab('body')">Body</div>
      <div class="tab" onclick="switchTab('auth')">Auth</div>
    </div>
    
    <div class="content-area">
      <div class="tab-content" id="tab-params">
        <div style="font-size:12px;color:#8b949e;margin-bottom:8px">查询参数 (URL ?key=value)</div>
        <div id="params-list"></div>
        <button class="btn" style="margin-top:8px" onclick="addParam()">+ 添加参数</button>
      </div>
      
      <div class="tab-content" id="tab-headers" style="display:none">
        <div style="font-size:12px;color:#8b949e;margin-bottom:8px">HTTP Headers</div>
        <div id="headers-list"></div>
        <button class="btn" style="margin-top:8px" onclick="addHeader()">+ 添加 Header</button>
      </div>
      
      <div class="tab-content" id="tab-body" style="display:none">
        <div style="font-size:12px;color:#8b949e;margin-bottom:8px">请求体 (JSON)</div>
        <textarea class="editor-area" id="body" style="height:300px">{
  "key": "value"
}</textarea>
      </div>
      
      <div class="tab-content" id="tab-auth" style="display:none">
        <div style="font-size:12px;color:#8b949e;margin-bottom:8px">认证方式</div>
        <select class="method-select" id="auth-type" onchange="updateAuth()">
          <option value="none">无认证</option>
          <option value="bearer">Bearer Token</option>
          <option value="basic">Basic Auth</option>
          <option value="api-key">API Key</option>
        </select>
        <div id="auth-fields" style="margin-top:12px"></div>
      </div>
    </div>
    
    <div class="response-area" id="response-area" style="display:none">
      <div class="response-header">
        <span class="status-badge" id="status-badge">200 OK</span>
        <span style="font-size:12px;color:#8b949e">Time: <span id="response-time">0</span>ms</span>
        <span style="font-size:12px;color:#8b949e">Size: <span id="response-size">0</span>B</span>
        <div style="flex:1"></div>
        <button class="btn" onclick="copyResponse()">📋 复制</button>
      </div>
      <div class="response-body" id="response-body"></div>
    </div>
  </div>
</div>

<div class="modal" id="new-request-modal">
  <div class="modal-content">
    <div style="font-size:16px;font-weight:600;margin-bottom:16px">新建请求</div>
    <input type="text" id="new-name" placeholder="请求名称" style="width:100%;margin-bottom:12px">
    <input type="text" id="new-url" placeholder="URL" style="width:100%;margin-bottom:16px">
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="createRequest()">创建</button>
    </div>
  </div>
</div>

<script>
let requests = JSON.parse(localStorage.getItem('apiforge_requests') || '[]');
let params = [];
let headers = [{key: 'Content-Type', value: 'application/json'}];
let currentRequest = null;

function renderCollection() {
  const list = document.getElementById('collection-list');
  list.innerHTML = requests.map((r, i) => `
    <div class="collection-item ${currentRequest === i ? 'active' : ''}" onclick="loadRequest(${i})">
      <span class="method-badge method-${r.method.toLowerCase()}">${r.method}</span>
      <span style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis">${r.name}</span>
    </div>
  `).join('');
}

function renderParams() {
  const list = document.getElementById('params-list');
  list.innerHTML = params.map((p, i) => `
    <div style="display:flex;gap:8px;margin:4px 0">
      <input type="text" value="${p.key}" placeholder="Key" style="flex:1" onchange="params[${i}].key=this.value">
      <input type="text" value="${p.value}" placeholder="Value" style="flex:1" onchange="params[${i}].value=this.value">
      <button class="btn" onclick="params.splice(${i},1);renderParams()">×</button>
    </div>
  `).join('');
}

function renderHeaders() {
  const list = document.getElementById('headers-list');
  list.innerHTML = headers.map((h, i) => `
    <div style="display:flex;gap:8px;margin:4px 0">
      <input type="text" value="${h.key}" placeholder="Header" style="flex:1" onchange="headers[${i}].key=this.value">
      <input type="text" value="${h.value}" placeholder="Value" style="flex:1" onchange="headers[${i}].value=this.value">
      <button class="btn" onclick="headers.splice(${i},1);renderHeaders()">×</button>
    </div>
  `).join('');
}

function addParam() { params.push({key:'', value:''}); renderParams(); }
function addHeader() { headers.push({key:'', value:''}); renderHeaders(); }

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.getElementById('tab-' + name).style.display = 'block';
}

async function sendRequest() {
  const method = document.getElementById('method').value;
  let url = document.getElementById('url').value;
  
  // Add params
  const validParams = params.filter(p => p.key);
  if (validParams.length) {
    url += (url.includes('?') ? '&' : '?') + validParams.map(p => `${encodeURIComponent(p.key)}=${encodeURIComponent(p.value)}`).join('&');
  }
  
  const btn = document.getElementById('send-btn');
  btn.textContent = '发送中...';
  btn.classList.add('loading');
  
  const startTime = Date.now();
  
  try {
    const options = {
      method,
      headers: {}
    };
    
    headers.forEach(h => { if (h.key) options.headers[h.key] = h.value; });
    
    // Auth
    const authType = document.getElementById('auth-type').value;
    if (authType === 'bearer') {
      const token = document.getElementById('bearer-token')?.value;
      if (token) options.headers['Authorization'] = `Bearer ${token}`;
    } else if (authType === 'basic') {
      const user = document.getElementById('basic-user')?.value;
      const pass = document.getElementById('basic-pass')?.value;
      if (user) options.headers['Authorization'] = 'Basic ' + btoa(`${user}:${pass}`);
    } else if (authType === 'api-key') {
      const key = document.getElementById('api-key-name')?.value;
      const val = document.getElementById('api-key-value')?.value;
      if (key && val) options.headers[key] = val;
    }
    
    if (['POST', 'PUT', 'PATCH'].includes(method)) {
      options.body = document.getElementById('body').value;
    }
    
    const response = await fetch(url, options);
    const endTime = Date.now();
    
    let body;
    const contentType = response.headers.get('content-type') || '';
    if (contentType.includes('json')) {
      body = await response.json();
    } else {
      body = await response.text();
    }
    
    // Display response
    document.getElementById('response-area').style.display = 'flex';
    
    const statusEl = document.getElementById('status-badge');
    statusEl.textContent = `${response.status} ${response.statusText}`;
    statusEl.className = 'status-badge status-' + (response.status < 300 ? '2xx' : response.status < 500 ? '4xx' : '5xx');
    
    document.getElementById('response-time').textContent = endTime - startTime;
    
    const bodyStr = typeof body === 'object' ? JSON.stringify(body, null, 2) : body;
    document.getElementById('response-size').textContent = new Blob([bodyStr]).size;
    
    document.getElementById('response-body').innerHTML = typeof body === 'object' ? syntaxHighlight(body) : escapeHtml(body);
    
  } catch (err) {
    document.getElementById('response-area').style.display = 'flex';
    document.getElementById('status-badge').textContent = 'Error';
    document.getElementById('status-badge').className = 'status-badge status-5xx';
    document.getElementById('response-body').textContent = err.message;
  }
  
  btn.textContent = '发送';
  btn.classList.remove('loading');
}

function syntaxHighlight(json) {
  const str = JSON.stringify(json, null, 2);
  return str.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
    let cls = 'json-number';
    if (/^"/.test(match)) {
      if (/:$/.test(match)) cls = 'json-key';
      else cls = 'json-string';
    } else if (/true|false/.test(match)) cls = 'json-boolean';
    return '<span class="' + cls + '">' + match + '</span>';
  });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function updateAuth() {
  const type = document.getElementById('auth-type').value;
  const fields = document.getElementById('auth-fields');
  
  if (type === 'bearer') {
    fields.innerHTML = `<input type="text" id="bearer-token" placeholder="Token" style="width:100%;margin-top:8px">`;
  } else if (type === 'basic') {
    fields.innerHTML = `
      <input type="text" id="basic-user" placeholder="Username" style="width:100%;margin-top:8px">
      <input type="text" id="basic-pass" placeholder="Password" style="width:100%;margin-top:8px">
    `;
  } else if (type === 'api-key') {
    fields.innerHTML = `
      <input type="text" id="api-key-name" placeholder="Header Name (e.g. X-API-Key)" style="width:100%;margin-top:8px">
      <input type="text" id="api-key-value" placeholder="API Key Value" style="width:100%;margin-top:8px">
    `;
  } else {
    fields.innerHTML = '';
  }
}

function saveRequest() {
  const name = prompt('请求名称:');
  if (!name) return;
  
  requests.push({
    name,
    method: document.getElementById('method').value,
    url: document.getElementById('url').value,
    params: [...params],
    headers: [...headers],
    body: document.getElementById('body').value
  });
  
  localStorage.setItem('apiforge_requests', JSON.stringify(requests));
  renderCollection();
}

function loadRequest(i) {
  const r = requests[i];
  currentRequest = i;
  document.getElementById('method').value = r.method;
  document.getElementById('url').value = r.url;
  params = r.params || [];
  headers = r.headers || [];
  document.getElementById('body').value = r.body || '';
  renderParams();
  renderHeaders();
  renderCollection();
}

function showNewRequest() {
  document.getElementById('new-request-modal').classList.add('show');
  document.getElementById('new-name').value = '';
  document.getElementById('new-url').value = '';
}

function closeModal() {
  document.querySelectorAll('.modal').forEach(m => m.classList.remove('show'));
}

function createRequest() {
  const name = document.getElementById('new-name').value || 'Untitled';
  const url = document.getElementById('new-url').value || 'https://';
  requests.push({ name, method: 'GET', url, params: [], headers: [], body: '' });
  localStorage.setItem('apiforge_requests', JSON.stringify(requests));
  renderCollection();
  closeModal();
}

function copyResponse() {
  const text = document.getElementById('response-body').textContent;
  navigator.clipboard.writeText(text);
}

// Init
renderCollection();
renderParams();
renderHeaders();
</script>
</body>
</html>
